name: Generate Videos

on:
  workflow_dispatch:
    inputs:
      drive_url:
        description: 'رابط ملف ZIP على Google Drive (مثال: https://drive.google.com/file/d/FILE_ID/view)'
        required: true
      project_name:
        description: 'اسم المشروع (مثال: pdf01) — يُستخدم كاسم للمجلد والـ artifact'
        required: true
        default: 'pdf01'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install numpy Pillow opencv-python-headless pydub requests "gdown>=4.7.3"
          ffmpeg -version | head -1

      - name: Download and extract project
        env:
          DRIVE_URL: ${{ github.event.inputs.drive_url }}
        run: |
          ZIP_NAME="${{ github.event.inputs.project_name }}.zip"
          FOLDER_NAME="${{ github.event.inputs.project_name }}"

          echo "⬇️ تنزيل $ZIP_NAME من Google Drive..."
          cat > /tmp/extract_id.py << 'PYEOF'
          import re, sys, os
          url = os.environ["DRIVE_URL"]
          m = re.search(r'/d/([a-zA-Z0-9_-]+)', url)
          if not m:
              m = re.search(r'id=([a-zA-Z0-9_-]+)', url)
          if m:
              print(m.group(1))
          else:
              sys.exit("Could not extract file ID from URL: " + url)
          PYEOF
          FILE_ID=$(python3 /tmp/extract_id.py)
          echo "📎 FILE_ID: $FILE_ID"
          gdown "$FILE_ID" -O "$ZIP_NAME"

          echo "📦 فك الضغط..."
          unzip "$ZIP_NAME"

          if [ ! -d "$FOLDER_NAME" ]; then
            mkdir -p "$FOLDER_NAME"
            for item in input assets *.py *.txt *.ipynb; do
              [ -e "$item" ] && mv "$item" "$FOLDER_NAME/"
            done
          fi

          echo "FOLDER_NAME=$FOLDER_NAME" >> $GITHUB_ENV
          echo "📂 محتويات المجلد:"
          ls "$FOLDER_NAME"/
          echo "📋 ملفات JSON:"
          ls "$FOLDER_NAME"/input/json/ | wc -l
          echo "🔊 ملفات Audio:"
          ls "$FOLDER_NAME"/input/audio/ | wc -l
          echo "💾 حجم المشروع:"
          du -sh "$FOLDER_NAME/"

      - name: Generate WebM videos
        run: |
          cd ${{ env.FOLDER_NAME }}
          export VIDEO_TEMP_DIR=/tmp/video_temp
          mkdir -p /tmp/video_temp output
          python batch_generate.py --skip_existing --crf 56 --fps 20 --parts 3

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ github.event.inputs.project_name }}
          path: ${{ env.FOLDER_NAME }}/output/
          retention-days: 5
